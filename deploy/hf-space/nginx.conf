worker_processes auto;
daemon off;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    # Non-root nginx: keep all writable paths under /tmp.
    client_body_temp_path /tmp/nginx-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    sendfile on;
    client_max_body_size 50m;      # allow large filing PDF uploads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    server {
        listen 7860;
        server_name _;

        root  /home/appuser/web;
        index index.html;

        # SPA client-side routing.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long-cache hashed build assets.
        location /assets/ {
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Reverse-proxy API calls to the in-container backend, stripping /api.
        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;      # deep LLM audits take a while
        }

        location = /healthz {
            add_header Content-Type text/plain;
            return 200 'ok';
        }
    }
}
